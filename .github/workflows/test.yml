name: Run unit test
on:
  push:
    branches: [ master]
    paths-ignore:
      - 'dbml-homepage/**'
  pull_request:
    branches: [ master ]
    types: [opened, synchronize]
    paths-ignore:
      - 'dbml-homepage/**'
jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        node-version: [22.x]
    services:
      postgres:
        image: postgres:15-bullseye
        env:
          POSTGRES_USER: dbml
          POSTGRES_PASSWORD: testtest
          POSTGRES_DB: dbml_test
        ports:
          - 5432:5432
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mssql:
        image: mcr.microsoft.com/mssql/server:2019-latest
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: dbml.123.123
        ports:
          - 1433:1433
        options: >-
          --health-cmd "exit 0"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mysql-8.0:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: dbml_test
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
    - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
    - name: Import DDL to Postgres
      run: |
        psql -h localhost -U dbml -d dbml_test -f packages/dbml-cli/__test__/db2dbml/postgres/schema.sql
      env:
        PGPASSWORD: testtest
    - name: Import DDL to MySQL
      run: |
        mysql -h 127.0.0.1 -u root -proot dbml_test < packages/dbml-cli/__test__/db2dbml/mysql/schema.sql
    - name: Import DDL to MSSQL
      run: |
        sqlcmd -S localhost -U sa -P dbml.123.123 -d master -i packages/dbml-cli/__test__/db2dbml/mssql/schema.sql
    - name: Generate SQLite database from schema
      run: |
        sqlite3 schema.db < schema.sql
      working-directory: packages/dbml-cli/__test__/db2dbml/sqlite/
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3.9.1
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'yarn'
    - name: Install dependencies
      run: yarn install --frozen-lockfile
    - name: Build packages
      run: yarn build
    - name: Run unit tests
      run: yarn test
